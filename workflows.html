<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI NovelSpeaker V1 - ComfyUI工作流</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="main-nav" id="mainNav"></aside>
      <main class="page">
        <header class="page-header">
          <div>
            <p class="eyebrow">工作流资产</p>
            <h1>ComfyUI 工作流管理</h1>
          </div>
          <div class="header-actions">
            <button class="primary-btn" id="createWorkflowBtn" type="button">创建工作流</button>
          </div>
        </header>
        <section class="panel">
          <div class="panel-head">
            <h2>工作流列表</h2>
          </div>
          <div id="workflowList" class="asset-list"></div>
        </section>
      </main>
    </div>

    <dialog id="workflowModal" class="modal">
      <form id="workflowForm" method="dialog">
        <h3 id="workflowModalTitle">创建工作流</h3>
        <div class="form-grid">
          <label>名称<input name="name" required /></label>
          <label class="full">描述<input name="description" /></label>
          <label class="full">工作流JSON<textarea name="jsonText" rows="10" required></textarea></label>
        </div>
        <menu>
          <button class="ghost-btn" id="workflowCancelBtn" type="button">取消</button>
          <button class="primary-btn" id="workflowSaveBtn" type="submit">保存</button>
        </menu>
      </form>
    </dialog>

    <div id="toast" class="toast"></div>
    <script type="module" src="./assets/workflows.js"></script>
  </body>
  </html>
