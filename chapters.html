<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI NovelSpeaker V1 - 章节管理</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="main-nav" id="mainNav"></aside>
      <main class="page chapter-page">
        <header class="page-header">
          <div>
            <h1 id="chapterPageTitle">章节管理</h1>
          </div>
          <div class="header-actions">
            <label class="header-novel-switch">切换小说
              <select id="chapterNovelSelect"></select>
            </label>
            <a class="ghost-btn" href="./index.html">返回小说管理</a>
            <a class="ghost-btn" href="./json-tasks.html">任务管理</a>
            <a class="ghost-btn" href="./audio-queue.html">有声队列</a>
          </div>
        </header>

        <section class="chapter-workspace">
          <aside class="chapter-side panel">
            <div class="panel-head">
              <h2>章节列表</h2>
              <button id="createChapterBtn" class="ghost-btn" type="button">创建章回</button>
            </div>
            <input id="chapterSearch" type="search" placeholder="搜索章节" />
            <div id="chapterQuickJump" class="chapter-quick-jump"></div>
            <ul id="chapterList" class="chapter-items"></ul>
          </aside>

          <section class="chapter-main panel">
            <div class="chapter-main-head">
              <h2 id="chapterTitle">请选择章节</h2>
              <div id="chapterMeta" class="meta"></div>
              <div class="chapter-actions">
                <button id="copyChapterBtn" class="ghost-btn" type="button">复制正文</button>
                <button id="downloadChapterBtn" class="ghost-btn" type="button">下载文本</button>
                <button id="convertJsonBtn" class="primary-btn" type="button">AI转JSON</button>
                <button id="viewJsonBtn" class="ghost-btn" type="button">查看JSON</button>
                <span id="audioScheduleWrap" class="audio-schedule-wrap">
                  <label class="audio-schedule-inline" for="audioScheduleMode">有声执行
                    <select id="audioScheduleMode">
                      <option value="immediate">立即</option>
                      <option value="scheduled">指定时间</option>
                    </select>
                  </label>
                  <input id="audioScheduleAt" class="hidden" type="datetime-local" />
                </span>
                <button id="generateAudioBtn" class="primary-btn" type="button">生成有声</button>
                <button id="downloadAudioBtn" class="ghost-btn" type="button">下载音频</button>
                <button id="editChapterBtn" class="ghost-btn" type="button">编辑章回</button>
                <button id="deleteChapterBtn" class="ghost-btn" type="button">删除章回</button>
                <span id="chapterStatus" class="reader-status">就绪</span>
              </div>
              <div id="chapterAudioBox" class="chapter-audio-box hidden">
                <audio id="chapterAudioPlayer" controls preload="metadata"></audio>
                <span id="chapterAudioDuration" class="meta">时长：-</span>
              </div>
            </div>
            <article id="chapterContent" class="chapter-reading">请从左侧选择章节查看内容。</article>
          </section>
        </section>
      </main>
    </div>

    <dialog id="jsonDialog" class="modal">
      <form method="dialog">
        <h3>章节结果查看</h3>
        <div class="json-view-tabs">
          <button id="viewJsonRawBtn" class="ghost-btn" type="button">查看JSON</button>
          <button id="viewJsonJubenBtn" class="ghost-btn" type="button">查看台词</button>
          <button id="viewJsonRolesBtn" class="ghost-btn" type="button">查看角色</button>
        </div>
        <pre id="chapterJsonPreview" class="code-block"></pre>
        <textarea id="chapterJsonEditor" class="code-block hidden" rows="16"></textarea>
        <menu>
          <button id="editJsonViewBtn" class="ghost-btn" type="button">编辑</button>
          <button id="saveJsonViewBtn" class="primary-btn hidden" type="button">保存</button>
          <button id="copyJsonBtn" class="ghost-btn" type="button">复制JSON</button>
          <button class="primary-btn" type="submit">关闭</button>
        </menu>
      </form>
    </dialog>

    <dialog id="chapterModal" class="modal">
      <form id="chapterForm" method="dialog">
        <h3 id="chapterModalTitle">创建章回</h3>
        <div class="form-grid">
          <label>章回序号<input name="chapterNum" type="number" min="1" required /></label>
          <label>章回标题<input name="title" required /></label>
          <label>字数<input name="wordCount" type="number" min="0" readonly disabled placeholder="自动计算" /></label>
          <label class="full">正文（可选）<textarea name="content" rows="8"></textarea></label>
        </div>
        <menu>
          <button id="chapterCancelBtn" class="ghost-btn" type="button">取消</button>
          <button class="primary-btn" type="submit">保存</button>
        </menu>
      </form>
    </dialog>

    <div id="toast" class="toast"></div>
    <script type="module" src="./assets/chapters.js"></script>
  </body>
  </html>
