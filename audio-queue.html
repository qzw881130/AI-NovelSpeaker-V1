<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI NovelSpeaker V1 - 有声队列</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="main-nav" id="mainNav"></aside>
      <main class="page">
        <header class="page-header">
          <div>
            <p class="eyebrow">有声生成调度</p>
            <h1>有声小说队列</h1>
          </div>
          <div class="header-actions">
            <label class="header-novel-switch">自动刷新
              <select id="audioRefreshIntervalSelect">
                <option value="0" selected>不刷新</option>
                <option value="5">5秒</option>
                <option value="10">10秒</option>
                <option value="20">20秒</option>
                <option value="30">30秒</option>
                <option value="60">60秒</option>
              </select>
            </label>
            <button class="ghost-btn cancel-all-btn" id="cancelAllAudioTasksBtn" type="button">全部终止</button>
            <button class="ghost-btn" id="refreshAudioQueueBtn" type="button">刷新队列</button>
          </div>
        </header>

        <section class="panel">
          <div class="panel-head">
            <h2>队列</h2>
            <div class="toolbar">
              <select id="audioNovelSelect"></select>
              <select id="audioStatusSelect">
                <option value="all">全部状态</option>
                <option value="pending">待执行</option>
                <option value="running">执行中</option>
                <option value="completed">已完成</option>
                <option value="cancelled">已终止</option>
                <option value="failed">失败</option>
              </select>
            </div>
          </div>
          <div id="audioTaskList" class="queue-list"></div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast"></div>
    <script type="module" src="./assets/audio-queue.js"></script>
  </body>
  </html>
